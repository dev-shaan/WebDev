<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>madarian drawing</title>

    <style>
        *{
            padding: 0;
            margin: 0;
            background-color: white;
        }
        body{
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        .paper{
            background-color: black;
            width: 748px;
            height: 748px;
            display: grid;
            gap: 9px;
            grid-template-rows: 414px 296px 20px;
            grid-template-columns:320px 419px ;

        }
        .red{
            background-color: red;
        }
        .gray1{
            background-color: gray;
        }
        .gray2{
            background-color: gray;
        }
        .gray3{
            background-color: gray;
            width: 360px;
        }
        .gray4{
            background-color: gray;
        }
        .yellow{
            background-color: yellow;
        }
    </style>
</head>
<body>
    <h1>mondrian drawing</h1>
    <div class="paper">
        <div class="red"></div>
        <div class="gray1"></div>
        <div class="gray2"></div>
        <div class="gray3"></div>
        <div class="gray4"></div>
        <div class="yellow"></div>
        <div class="black"></div>
    </div>
    
</body>
</html>
