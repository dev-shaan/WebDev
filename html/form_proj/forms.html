<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FORMS</title>
    <link rel="stylesheet" href="formStyle.css">
</head>

<body>

    <H1>FORMS IN HTML</H1>
<div class="container">
    <div class="left">
        <FORM action="/submit.php">     <!--to transfer the data to bakened we use php-->
        <div >
            <label for="name" > name</label>
            <input type="text" placeholder="enter name">
        </div>
        <div>
            <label for="phone">phone </label>
            <input id="phone" type="tel" placeholder="enter phone " required>
        </div>
        <div>
            <label for="email">email</label>
            <input type="email" name="" placeholder="enter email" id="email">
        </div>
    </div>
    <div class="right">
        <div>
            <label for="pass">password</label>
            <input type="password" name="pa" id="pass">

        </div>
        <div>
            <label for="dob">dob</label>
            <input type="date" id="dob">
        </div>
        <div>
            <label for="gen">gender</label>
            <select id="gen" required>
                <option value="" disabled selected>select option</option>
                <option value="male">male</option>
                <option value="female">female</option>
                <option value="other">other</option>
            </select>
        </div>
    </div>        
</div>
<hr>
<div class="subs">
        <u>
            <p>Subcription plans :-</p>
        </u>
        <input id="premium" type="radio" name="subscription">
        <label for="premium">premium</label>        <!--use to click on the text also-->

        <input type="radio" id="basic" name="subscription">
        <label for="basic">basic</label>
        

        <input type="radio" id="vip" name="subscription">
        <label for="vip">VIP</label>
    </div>
    <div class="conf"><label for="conform">conform</label>
        <input type="checkbox" id="conform">
    </div>
    <hr>
    <div class="endForm">
        <div>
            <label for="say">say something</label>
            <br>
            <textarea name="tgrt'" placeholder="please write here" id="say" ></textarea>
        </div>
        <br>
        <div>
        <label for="postal-code">Postal Code: </label>
        <input type="text" id="postal-code" />
        </div>
        <label for="country">Country: </label>
        <select id="country">
            <option value="ch">Switzerland</option>
            <option value="fr">France</option>
            <option value="de">Germany</option>
            <option value="nl">The Netherlands</option>
        </select>
        <div class="sub">
            <button type="submit" >submit</button>
        </div>
    </form>
    </div>

</body>

</html>
